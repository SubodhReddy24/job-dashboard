<style>
  :root { color-scheme: light;

  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
  h1 { font-size: 20px; margin: 0 0 4px 0; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .summary { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip { border-radius: 10px; padding: 10px 14px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--card); user-select: none; }
  .chip.active { outline: 2px solid var(--text); }
  .chip b { display: block; font-size: 18px; }
  .controls { display: flex; gap: 8px; margin-bottom: 14px; }
  input#search { flex: 1; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 14px; }
  .job { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .job-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; cursor: pointer; }
  .job-title { font-weight: 600; font-size: 14.5px; }
  .job-company { color: var(--muted); font-size: 13px; }
  .badge { font-size: 11.5px; padding: 3px 9px; border-radius: 999px; font-weight: 600; white-space: nowrap; }
  .badge.applied { background: var(--applied-bg); color: var(--applied); }
  .badge.manual_required { background: var(--manual-bg); color: var(--manual); }
  .badge.needs_account { background: var(--account-bg); color: var(--account); }
  .badge.on_hold { background: var(--hold-bg); color: var(--hold); }
  .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .score { font-weight: 600; }
  .details { display: none; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; font-size: 13px; }
  .details.open { display: block; }
  .reason { margin-bottom: 6px; }
  .flags { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; }
  .flags ul { margin: 2px 0 0 16px; padding: 0; font-size: 12.5px; }
  .files { color: var(--muted); font-size: 12.5px; margin-bottom: 6px; }
  a.listing-link { color: #2563eb; text-decoration: none; font-size: 12.5px; }
  .qa-toggle { font-size: 12.5px; color: #2563eb; cursor: pointer; margin-top: 6px; display: inline-block; }
  .qa-panel { display: none; margin-top: 8px; }
  .qa-panel.open { display: block; }
  .qa-item { padding: 6px 0; border-bottom: 1px dashed var(--border); }
  .qa-item:last-child { border-bottom: none; }
  .qa-q { font-weight: 600; font-size: 12.5px; }
  .qa-a { font-size: 12.5px; margin-top: 2px; }
  .empty { text-align: center; color: var(--muted); padding: 30px; font-size: 13px; }
  .note-banner { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; font-size: 12.5px; padding: 8px 12px; border-radius: 8px; margin-bottom: 14px; }
</style>
</head>

  const q = document.getElementById("search").value.toLowerCase();
  const list = document.getElementById("list");
  const filtered = JOBS.filter(j => {
    if (activeBucket && j.bucket !== activeBucket) return false;
    if (q && !(j.company.toLowerCase().includes(q) || j.title.toLowerCase().includes(q))) return false;
    return true;
  });
  if (filtered.length === 0) { list.innerHTML = '<div class="empty">No jobs match.</div>'; return; }

  list.innerHTML = filtered.map((j, idx) => {
    const qaHtml = j.qa.length ? j.qa.map(qq => `<div class="qa-item"><div class="qa-q">${esc(qq.question)}</div><div class="qa-a">${esc(qq.answer)}</div></div>`).join("") : "";
    const qaBtn = j.qa.length ? `<span class="qa-toggle" data-idx="${idx}">View Q&amp;A (${j.qa.length})</span><div class="qa-panel" id="qa-${idx}">${qaHtml}</div>` : "";
    const redFlags = j.red_flags.length ? `<div><b>Watch:</b><ul>${j.red_flags.map(f=>`<li>${esc(f)}</li>`).join("")}</ul></div>` : "";
    const greenFlags = j.green_flags.length ? `<div><b>Fit:</b><ul>${j.green_flags.map(f=>`<li>${esc(f)}</li>`).join("")}</ul></div>` : "";
    const files = (j.resume_name || j.cl_name) ? `<div class="files">${j.resume_name ? "Resume: "+esc(j.resume_name) : ""} ${j.cl_name ? " &middot; Cover letter: "+esc(j.cl_name) : ""}</div>` : "";
    const manualReason = j.manual_reason ? `<div class="reason"><b>Note:</b> ${esc(j.manual_reason)}</div>` : "";
    return `
    <div class="job">
      <div class="job-top" data-idx="${idx}">
        <div>
          <div class="job-title">${esc(j.title)}</div>
          <div class="job-company">${esc(j.company)} &middot; ${esc(j.location)}</div>
          <div class="meta"><span class="score">${j.score}/100</span> &middot; ${esc(j.source)} &middot; discovered ${esc(j.discovered)}${j.applied ? " &middot; applied "+esc(j.applied) : ""}</div>
        </div>
        <span class="badge ${j.bucket}">${BUCKET_LABEL[j.bucket]}</span>
      </div>
      <div class="details" id="details-${idx}">
        ${j.reason ? `<div class="reason">${esc(j.reason)}</div>` : ""}
        ${manualReason}
        <div class="flags">${greenFlags}${redFlags}</div>
        ${files}
        <a class="listing-link" href="${j.url}" target="_blank">Open original listing &rarr;</a>
        ${qaBtn}
      </div>
    </div>`;
  }).join("");

  list.querySelectorAll(".job-top").forEach(top => {
    top.addEventListener("click", () => {
      document.getElementById("details-" + top.getAttribute("data-idx")).classList.toggle("open");
    });
  });
  list.querySelectorAll(".qa-toggle").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      document.getElementById("qa-" + btn.getAttribute("data-idx")).classList.toggle("open");
    });
  });
}

document.getElementById("search").addEventListener("input", renderList);
renderSummary();
renderList();
</script>
</body>
</html>
